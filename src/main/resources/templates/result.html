<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Result</title>
    <link rel="stylesheet" href="../public/css/stylesheet.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">

</head>
<body>

<div class="heroBannerResult">
    <div id="carImage"><img src="../public/images/CarIcon.png"></div>
    <div id="welcomeTitle"> <h1>Search Results: </h1> </div>
</div>

<div class="departure">
    <h2 class="departureTitle">Departure:</h2>
    <div class="box1">
        <div id="driverName1"><h2>Moaf</h2></div>
        <div id="departureTime1">Time: kl 7:30</div>
        <div id="dropLocation1">Place: At the train station</div>
        <button class="selectBtn">Choose</button>
    </div>
    <div class="box2">
        <div id="driverName2"><h2>Amandu</h2></div>
        <div id="departureTime2">Time: kl 9:00</div>
        <div id="dropLocation2">Place: at the school</div>
        <button class="selectBtn">Choose</button>
    </div>
</div>

<div class="return">
    <h2 class="returnTitle">Return:</h2>
    <div class="box3">
        <div id="driverName3"><h2>Moaf</h2></div>
        <div id="departureTime3">Time: kl 16:25</div>
        <div id="dropLocation3">Place: University campus</div>
        <button class="selectBtn">Choose</button>
    </div>
    <div class="box2">
        <div id="driverName4"><h2>Amandu</h2></div>
        <div id="departureTime4">Time: kl 17:00</div>
        <div id="dropLocation4">Place: at the candy store</div>
        <button class="selectBtn">Choose</button>
    </div>
</div>

</body>
</html>
